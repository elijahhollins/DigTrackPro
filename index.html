
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigTrack Pro - Locate Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Polyfill process.env for SDK compatibility
      window.process = window.process || { env: {} };
    </script>
    <style>
        :root {
            --brand-primary: #3b82f6;
            --brand-ring: rgba(59, 130, 246, 0.1);
            --brand-shadow: rgba(59, 130, 246, 0.25);
        }
        * { box-sizing: border-box; }
        html, body, #root { height: 100%; }
        body { 
          font-family: 'Inter', sans-serif; 
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .bg-brand { background-color: var(--brand-primary) !important; }
        .text-brand { color: var(--brand-primary) !important; }
        .border-brand { border-color: var(--brand-primary) !important; }
        .ring-brand { --tw-ring-color: var(--brand-ring) !important; }
        .shadow-brand\/20 { --tw-shadow-color: var(--brand-shadow) !important; }
        .glow-brand { filter: drop-shadow(0 0 6px var(--brand-shadow)); }
        .bg-brand\/10 { background-color: color-mix(in srgb, var(--brand-primary) 10%, transparent) !important; }
        .bg-brand\/15 { background-color: color-mix(in srgb, var(--brand-primary) 15%, transparent) !important; }
        .bg-brand\/20 { background-color: color-mix(in srgb, var(--brand-primary) 20%, transparent) !important; }
        .border-brand\/20 { border-color: color-mix(in srgb, var(--brand-primary) 20%, transparent) !important; }
        .border-brand\/25 { border-color: color-mix(in srgb, var(--brand-primary) 25%, transparent) !important; }
        .text-brand\/60 { color: color-mix(in srgb, var(--brand-primary) 60%, transparent) !important; }
        .shadow-brand\/20 { box-shadow: 0 4px 24px var(--brand-shadow) !important; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        @keyframes viewEnter {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .view-transition { animation: viewEnter 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes statusPulse {
          0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
          50% { box-shadow: 0 0 0 4px transparent; opacity: 0.8; }
        }
        .status-dot-pulse { animation: statusPulse 2s ease infinite; }

        /* Sidebar nav active underline indicator */
        .sidebar-active::after {
          content: '';
          position: absolute;
          left: 0; top: 50%; transform: translateY(-50%);
          width: 3px; height: 60%;
          background: var(--brand-primary);
          border-radius: 0 3px 3px 0;
        }

        /* Refined scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.15); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.3); }

        /* Focus */
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
          outline: 2px solid var(--brand-primary);
          outline-offset: 2px;
        }

        /* Table row hover transition */
        tbody tr { transition: background-color 0.12s ease; }
    </style>
<script type="importmap">
{

    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",

    "pdfjs-dist": "https://esm.sh/pdfjs-dist@4.4.168",

  }
}
</script>
</head>

</html>
